<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base :: head('Reservas', ~{::style})">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style></style>
</head>
<body th:replace="base :: body(~{::main})">
    <main>
        <h1>Reservas</h1>
        <form action="" method="get">
            <label for="desde">Desde:</label>
            <input type="date" name="desde" id="desde" th:value="${param.desde}">
            <label for="hasta">Hasta:</label>
            <input type="date" name="hasta" id="hasta" th:value="${param.hasta}">
            <label for="numeroHabitacion">Número de Habitación:</label>
            <input type="number" name="numeroHabitacion" id="numeroHabitacion" th:value="${param.numeroHabitacion}">
            <label for="nombre">Nombre del Cliente:</label>
            <input type="text" name="nombre" id="nombre" th:value="${param.nombre}">

            <button type="submit" class="action action-primary">Buscar</button>
            <a th:href="@{/reservas}" class="action action-secondary">Limpiar búsqueda</a>
        </form>
        <table class="reservas">
            <thead>
                <tr>
                    <th>Localizador</th>
                    <th>Habitación</th>
                    <th>Fecha Inicio</th>
                    <th>Fecha Fin</th>
                    <th>Cliente</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="reserva : ${reservas}">
                    <td>
                        <a th:href="@{/reservas/{localizador}(localizador=${reserva.localizador})}" th:text="${reserva.localizador}"></a>
                    </td>
                    <td th:text="${reserva.habitacion.numero}"></td>
                    <td th:text="${reserva.fechaEntrada}"></td>
                    <td th:text="${reserva.fechaSalida}"></td>
                    <td th:text="${reserva.nombreCliente}"></td>
                </tr>
            </tbody>
        </table>

        <a th:href="@{/reservas/nueva}" class="action action-primary">Nueva Reserva</a>

    </main>
</body>
</html>
