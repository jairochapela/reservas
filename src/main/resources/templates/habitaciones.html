<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base :: head('Habitaciones', ~{::style})">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        .floor {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
        }
        .room {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        .room h2 {
            font-size: 10pt;
        }
        .room h3 {
            font-size: 8pt;
            margin: 5px 0;
        }
        .room p {
            font-size: 8pt;
            margin: 5px 0;
        }
    </style>
</head>
<body th:replace="base :: body(~{::main})">
    <main>
        <h1>Habitaciones</h1>
        <form action="" method="get">
            <label for="desde">Desde:</label>
            <input type="date" name="desde" id="desde" th:value="${desde}">
            <label for="hasta">Hasta:</label>
            <input type="date" name="hasta" id="hasta" th:value="${hasta}">

            <label for="tipo">Tipo de habitación:</label>
            <select name="tipo" id="tipo">
                <option value="">Todos los tipos</option>
                <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}"></option>
            </select>

            <button type="submit" class="action action-primary">Buscar</button>
            <a th:href="@{/habitaciones}" class="action action-secondary">Limpiar búsqueda</a>
        </form>
        <div th:each="floor : ${hotel}" class="floor">
            <div th:each="room : ${floor}" class="room">
                <h2 th:text="'Habitación ' + ${room.numero}"></h2>
                <h3 th:text="${room.tipo}"></h3>
                <p>Libre</p>
                <a href="#">Reservar</a>
            </div>
        </div>
    </main>

</body>
</html>
